name: rsvp_reader
description: >-
  Open-source Flutter EPUB reader with RSVP (Rapid Serial Visual Presentation)
  for speed reading. Features ORP highlighting, smart timing, ramp-up, three
  reading modes (RSVP, scroll, ereader), chapter-aware progress, velocity-based
  scroll tracking, fully customizable theme, and offline-first storage.
publish_to: 'none'
version: 0.1.0
repository: https://github.com/daniel-pimenta-cc/rsvp_reader
homepage: https://github.com/daniel-pimenta-cc/rsvp_reader
issue_tracker: https://github.com/daniel-pimenta-cc/rsvp_reader/issues

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # EPUB parsing
  epub_pro: ^5.6.0
  html: ^0.15.5

  # Database
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5

  # Simple preferences
  shared_preferences: ^2.5.3

  # File handling
  file_picker: ^9.2.1

  # Storage Access Framework (Android). Lets the user pick a folder from any
  # provider installed on their device (Google Drive, Dropbox, OneDrive, local
  # storage, …) and gives us a persistable tree URI we can read/write across
  # app restarts. dart:io can't write to these content:// URIs, so we need
  # these plugins instead.
  saf_util: ^2.0.0
  saf_stream: ^2.0.0

  # UI
  google_fonts: ^6.2.1
  flex_color_picker: ^3.6.0

  # Scroll
  scrollable_positioned_list: ^0.3.8

  # Data classes
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Image processing (transitive dep of epub_pro, needed for cover encoding)
  image: ^4.8.0

  # Utilities
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.24.0
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_final.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#1F2937"
  adaptive_icon_foreground: "assets/icon/icon_final.png"
